name: 抓取 OpenBMC 邮件列表

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - master

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 创建输出目录
        run: mkdir -p output

      - name: 获取最新帖子
        id: fetch
        run: |
          echo "📡 正在获取邮件列表..."

          # 尝试多个来源
          SOURCES=(
            "https://lore.kernel.org/openbmc/?feed=rss"
            "https://lore.kernel.org/openbmc/?format=atom"
            "https://mail-index.netbsd.org/source/changes/?project=openbmc&柳format=浜岀"  # 备用
          )

          CONTENT=""
          for url in "${SOURCES[@]}"; do
            echo "尝试: $url"
            CONTENT=$(curl -sL --max-time 30 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$url" 2>/dev/null || echo "")

            if echo "$CONTENT" | grep -q "<item\|<entry"; then
              echo "✅ 成功获取 RSS/Atom 内容"
              echo "$CONTENT" > output/feed.xml
              break
            fi
          done

          # 检查是否获取到内容
          if ! echo "$CONTENT" | grep -q "<item\|<entry"; then
            echo "⚠️ 无法直接获取 RSS，保存状态以便调试"
            echo "$CONTENT" > output/feed.xml
            echo "has_content=false" >> $GITHUB_OUTPUT
          else
            echo "has_content=true" >> $GITHUB_OUTPUT
          fi

      - name: 解析帖子
        if: steps.fetch.outputs.has_content == 'true'
        id: parse
        run: |
          echo "📝 正在解析帖子..."

          cat > parse.py << 'PYTHON'
import re
import json
import sys
from datetime import datetime

# 读取 RSS 内容
with open('output/feed.xml', 'r', encoding='utf-8') as f:
    content = f.read()

posts = []

# 解析 RSS/Atom 项
item_regex = r'<item>([\s\S]*?)</item>'
entry_regex = r'<entry>([\s\S]*?)</entry>'

def get_field(text, tag):
    # 尝试多种匹配方式
    patterns = [
        rf'<{tag}[^>]*><!\[CDATA\[([\s\S]*?)\]\]></{tag}>',
        rf'<{tag}[^>]*>([\s\S]*?)</{tag}>',
    ]
    for pattern in patterns:
        m = re.search(pattern, text, re.IGNORECASE)
        if m:
            return m.group(1).strip()
    return ''

def clean_html(text):
    if not text:
        return ''
    # 移除 HTML 标签
    text = re.sub(r'<[^>]+>', '', text)
    # 解码 HTML 实体
    text = text.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
    text = text.replace('&quot;', '"').replace('&apos;', "'").replace('&#39;', "'")
    text = text.replace('&nbsp;', ' ').replace('&#x20;', ' ')
    return text.strip()

def parse_date(date_str):
    if not date_str:
        return ''
    try:
        dt = datetime.strptime(date_str, '%a, %d %b %Y %H:%M:%S %z')
        return dt.astimezone().strftime('%Y-%m-%d %H:%M:%S')
    except:
        try:
            dt = datetime.strptime(date_str[:26], '%Y-%m-%dT%H:%M:%S')
            return dt.strftime('%Y-%m-%d %H:%M:%S')
        except:
            return date_str[:19] if len(date_str) > 19 else date_str

# 匹配 item 或 entry
for regex in [item_regex, entry_regex]:
    for match in re.finditer(regex, content):
        item = match.group(1)

        title = clean_html(get_field(item, 'title'))
        link = get_field(item, 'link')
        description = get_field(item, 'description') or get_field(item, 'summary') or get_field(item, 'content')
        pub_date = get_field(item, 'pubDate') or get_field(item, 'published') or get_field(item, 'updated')
        author = get_field(item, 'author') or get_field(item, 'dc:creator') or get_field(item, 'name')
        guid = get_field(item, 'guid') or link

        if title:
            posts.append({
                'id': guid,
                'subject': title[:200],
                'link': link if link.startswith('http') else f'https://lore.kernel.org{link}',
                'author': clean_html(author)[:50],
                'date': parse_date(pub_date),
                'pubDate': pub_date,
                'summary': clean_html(description)[:200] if description else ''
            })

# 去重
seen = set()
unique_posts = []
for p in posts:
    if p['id'] not in seen:
        seen.add(p['id'])
        unique_posts.append(p)

# 保存 JSON
data = {
    'meta': {
        'source': 'https://lore.kernel.org/openbmc/',
        'scrapedAt': datetime.now().astimezone().isoformat(),
        'totalPosts': len(unique_posts)
    },
    'posts': unique_posts
}

with open('output/posts.json', 'w', encoding='utf-8') as f:
    json.dump(data, f, ensure_ascii=False, indent=2)

print(f"✅ 解析完成，共 {len(unique_posts)} 条帖子")

# 生成 Markdown 摘要
if unique_posts:
    now = datetime.now().astimezone().strftime('%Y-%m-%d %H:%M:%S')
    md = f'''# OpenBMC 邮件列表最新动态

> 自动生成于 {now}

## 📊 统计

| 指标 | 数值 |
|------|------|
| 帖子总数 | {len(unique_posts)} |

## 🔥 最新帖子

| 日期 | 作者 | 主题 |
|------|------|------|
'''

    for post in unique_posts[:30]:
        author = post['author'].split('@')[0].split('<')[0].strip()[:15]
        date = post['date'][:10] if post['date'] else ''
        subject = post['subject'][:60]
        link = post['link']
        md += f'| {date} | {author} | [{subject}]({link}) |\n'

    md += f'''
---

*🔗 来源: https://lore.kernel.org/openbmc/*

*[返回首页](/README)* | *[目录](/_sidebar)*
'''

    with open('output/summary.md', 'w', encoding='utf-8') as f:
        f.write(md)

    print(f'✅ 已生成 summary.md')
else:
    print('⚠️ 未解析到帖子')
    # 创建占位文件
    with open('output/posts.json', 'w', encoding='utf-8') as f:
        json.dump({'meta': {'error': '无法获取帖子数据'}, 'posts': []}, f, ensure_ascii=False, indent=2)
PYTHON

          python3 parse.py

      - name: 生成占位内容
        if: steps.fetch.outputs.has_content != 'true'
        run: |
          echo "⚠️ 无法获取 RSS 内容，生成占位文件"

          cat > output/posts.json << 'EOF'
{
  "meta": {
    "source": "https://lore.kernel.org/openbmc/",
    "scrapedAt": "请手动访问网站查看",
    "totalPosts": 0,
    "error": "lore.kernel.org 使用 Anubis 反爬虫保护，无法自动抓取"
  },
  "posts": []
}
EOF

          cat > output/summary.md << 'EOF'
# OpenBMC 邮件列表最新动态

> ⚠️ 自动抓取暂时不可用

## 原因

lore.kernel.org 使用了 **Anubis** 反爬虫保护，需要浏览器执行 JavaScript 验证。

GitHub Actions 的无头浏览器未能通过验证。

## 解决方案

### 方案 1: 手动触发 Workflow
1. 访问 https://github.com/WangXianzhen/openbmc-cn/actions
2. 点击 "抓取 OpenBMC 邮件列表"
3. 点击 "Run workflow"

### 方案 2: 订阅邮件列表
1. 访问 https://lists.ozlabs.org/listinfo/openbmc
2. 订阅后通过邮件接收最新讨论

### 方案 3: 手动访问
- 📧 邮件归档: https://lore.kernel.org/openbmc/
- 💬 GitHub 讨论: https://github.com/orgs/openbmc/discussions

---

*[返回首页](/README)* | *[目录](/_sidebar)*
EOF

      - name: 显示结果
        run: |
          echo ""
          echo "📁 输出文件:"
          ls -la output/
          echo ""
          if [ -f output/posts.json ]; then
            echo "📊 帖子数量:"
            python3 -c "import json; d=json.load(open('output/posts.json')); print(f'  {d[\"meta\"][\"totalPosts\"]} 条')" 2>/dev/null || echo "  0 条"
          fi

      - name: 提交更改
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add output/

          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有新的数据，跳过提交"
          else
            git commit -m "chore: 更新邮件列表 $(date +%Y-%m-%d\ %H:%M)"
            git push
            echo "✅ 已提交并推送更新"
          fi