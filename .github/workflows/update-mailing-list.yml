name: 更新邮件列表页面

on:
  schedule:
    # 每周一 UTC 0:00 更新
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置日期
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: 更新邮件列表页面
        run: |
          # 更新页面底部的日期
          CURRENT_DATE=$(date +%Y-%m-%d)
          sed -i "s/本页面最后更新: [0-9-]*/本页面最后更新: $CURRENT_DATE/" resources/04-mailing-list.md

          # 显示更新后的内容
          echo "✅ 页面已更新"
          echo "📅 更新日期: $CURRENT_DATE"

      - name: 提交更改
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: 更新邮件列表页面 $(date +%Y-%m-%d)"
          git push